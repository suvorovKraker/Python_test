{% extends "base.html" %}

{% block title %}Карта — Parking SPB{% endblock %}

{% block nav %}
<a href="/">Карта</a>
<a href="/admin" id="admin-link" class="hidden">Админка</a>
<a href="/login" id="login-link">Войти</a>
<button type="button" id="logout-btn" class="hidden link-btn">Выйти</button>
{% endblock %}

{% block content %}
<section class="status-panel" id="status-panel">
  <div class="toolbar">
    <div id="map-provider"></div>
    <button type="button" id="geo-btn" class="success-btn">Включить геолокацию</button>
    <button type="button" id="paid-btn" class="hidden success-btn">Я оплатил</button>
  </div>
  <p id="geo-status">Запросите доступ к геолокации для отслеживания парковки.</p>
  <p id="session-status" class="muted"></p>
  <p id="timer-status" class="muted hidden"></p>
</section>
<section id="map" class="map"></section>
<section class="notifications-panel" id="notifications-panel"></section>
{% endblock %}

{% block scripts %}
<script>
  window.APP_CONFIG = {
    center: [{{ city_center_lat }}, {{ city_center_lng }}],
    zoom: {{ city_zoom }}
  };
</script>
<script src="/static/js/map-engine.js"></script>
<script src="/static/js/geo.js"></script>
<script src="/static/js/app.js"></script>
{% endblock %}
